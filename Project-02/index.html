<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App - Monochrome Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; color: #111; 
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            border-radius: 2rem;
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 8s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">
    <!-- Monochrome abstract blurred shapes -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute -top-40 -right-40 w-72 h-72 md:w-96 md:h-96 bg-gray-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
        <div class="absolute top-40 -left-20 w-64 h-64 md:w-80 md:h-80 bg-zinc-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-20 left-40 w-72 h-72 md:w-96 md:h-96 bg-slate-300 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-4000"></div>
    </div>

    <nav class="h-24 md:h-28 px-6 md:px-10 flex items-center justify-between w-full max-w-7xl mx-auto z-10 font-bold shrink-0">
        <a href="index.html" class="flex items-center text-2xl md:text-3xl font-black tracking-tight text-gray-900 drop-shadow-sm">
            <div class="w-10 h-10 md:w-12 md:h-12 bg-black rounded-xl md:rounded-[14px] flex items-center justify-center text-white font-bold text-xl md:text-2xl mr-3 md:mr-4 shadow-lg shadow-black/20">F</div>
            Finance.
        </a>
        <div class="flex items-center space-x-4 md:space-x-6">
            <a href="login.html" class="font-black text-[10px] md:text-sm tracking-widest uppercase text-gray-500 hover:text-black transition-colors">Log In</a>
            <a href="signup.html" class="px-5 py-3 md:px-8 md:py-3.5 bg-black text-white rounded-xl md:rounded-2xl font-black text-[10px] md:text-sm hover:bg-gray-800 hover:-translate-y-0.5 transition-all shadow-lg shadow-black/10 uppercase tracking-widest border border-black">Get Started</a>
        </div>
    </nav>
    <main class="flex-1 flex flex-col items-center flex-col justify-center max-w-5xl mx-auto px-6 text-center z-10 w-full md:-mt-10 py-12 md:py-0">
        <div class="inline-block mb-6 md:mb-8 px-4 py-2 md:px-5 md:py-2 glass-panel !rounded-full text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] text-gray-500 border-white/60">
            The New Standard of Wealth
        </div>
        <h1 class="text-5xl md:text-[5.5rem] font-black tracking-tighter text-gray-900 drop-shadow-sm leading-[1.1] mb-6 md:mb-8">
            Manage your money.<br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-900 to-gray-400">Without the noise.</span>
        </h1>
        <p class="text-base md:text-xl font-medium text-gray-500 max-w-2xl mx-auto mb-10 md:mb-12 leading-relaxed px-4 md:px-0">
            Experience absolute control over your personal finances with a powerful, brutally minimalist, monochrome dashboard designed for pristine clarity.
        </p>
        <div class="flex flex-col md:flex-row flex-wrap items-stretch justify-center gap-4 md:gap-5 w-full md:w-auto">
            <a href="signup.html" class="w-full md:w-auto px-8 py-5 bg-black text-white rounded-2xl font-black text-xs md:text-sm hover:bg-gray-800 transition-all shadow-[0_8px_20px_rgba(0,0,0,0.15)] md:hover:-translate-y-1 uppercase tracking-[0.15em] border border-black">Create Free Account</a>
            <a href="dashboard.html" class="w-full md:w-auto px-8 py-5 glass-panel !rounded-2xl text-black font-black text-xs md:text-sm hover:bg-white transition-all shadow-sm border border-white uppercase tracking-[0.15em]">View Live Demo</a>
        </div>
    </main>
</body>
</html>
