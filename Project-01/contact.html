<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Locator | CTS_SM Supermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fafafa; color: #1a1a1a; transition: background-color 0.5s ease, color 0.5s ease; }
        .dark body { background: #0f172a; color: #f8fafc; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 100% 0%, #ecfdf5 0%, transparent 40%), radial-gradient(circle at 0% 100%, #fff7ed 0%, transparent 40%); transition: opacity 0.5s ease; }
        .dark .mesh-bg { background: radial-gradient(circle at 100% 0%, #064e3b 0%, transparent 40%), radial-gradient(circle at 0% 100%, #431407 0%, transparent 40%); }
        .frosted-glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .frosted-glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        .floating-ui { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .dark .floating-ui { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { emerald: { 600: '#059669' }, orange: { 500: '#f97316' } }, borderRadius: { '4xl': '2rem', '5xl': '3rem' } } } }
    </script>
</head>
<body x-data="{
    activeStore: 'Colombo Hub',
    stores: {
        'Colombo Hub': { address: 'No 45, Galle Road, Colombo 03', phone: '+94 11 234 5678', hours: '24/7 Premium Access' },
        'Kandy Prime': { address: 'No 12, Peradeniya Road, Kandy', phone: '+94 81 234 5678', hours: '6:00 AM - 12:00 AM' },
        'Galle Boutique': { address: 'Old Dutch Fort, Galle', phone: '+94 91 234 5678', hours: '8:00 AM - 10:00 PM' }
    }
}"
x-init="$store.theme.init()"
:class="$store.theme.isDark ? 'dark' : ''">
    <div class="mesh-bg"></div>
    <script src="js/app.js"></script>

    <!-- Navigation -->
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-7xl">
        <div class="frosted-glass rounded-[2.5rem] px-6 md:px-8 py-4 flex justify-between items-center shadow-2xl shadow-slate-200/50 border-white/40 dark:border-white/10">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-slate-900 dark:bg-emerald-600 rounded-2xl flex items-center justify-center text-white"><i data-lucide="zap" class="w-5 h-5 md:w-6 md:h-6 fill-current"></i></div>
                <span class="text-xl md:text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase transition-colors">CTS<span class="text-emerald-600">_SM</span></span>
            </a>

            <div class="hidden md:flex items-center gap-10 font-bold text-slate-500 uppercase tracking-widest text-[10px]">
                <a href="index.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Hub</a>
                <a href="shop.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Store</a>
                <a href="contact.html" class="text-slate-900 dark:text-white transition-all scale-110 font-black">Finder</a>
            </div>

            <div class="flex items-center gap-2 md:gap-3">
                <!-- Theme Toggle -->
                <button @click="$store.theme.toggle()" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all">
                    <i x-show="!$store.theme.isDark" data-lucide="moon" class="w-5 h-5 md:w-6 md:h-6 text-slate-600"></i>
                    <i x-show="$store.theme.isDark" data-lucide="sun" class="w-5 h-5 md:w-6 md:h-6 text-yellow-400"></i>
                </button>

                <a href="cart.html" class="relative p-3 md:p-4 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all group">
                    <i data-lucide="shopping-bag" class="w-5 h-5 md:w-6 md:h-6 text-slate-600 dark:text-slate-400 group-hover:text-emerald-600 transition-colors"></i>
                    <template x-if="$store.cart.count > 0">
                        <span x-text="$store.cart.count" class="absolute top-2 right-2 bg-emerald-600 text-white text-[8px] md:text-[9px] font-black px-1.5 py-0.5 rounded-full"></span>
                    </template>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 lg:px-12 mt-10 grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20">
        <!-- Store List -->
        <div class="pt-28 lg:pt-40">
            <p class="text-xs font-black text-emerald-600 uppercase tracking-[0.2em] mb-2">Our Locations</p>
            <h3 class="text-5xl font-black text-slate-900 dark:text-white tracking-tight mb-10">Find a CTS_SM Store Near You</h3>

            <div class="space-y-6">
                <template x-for="(store, name) in stores" :key="name">
                    <div @click="activeStore = name"
                         :class="{'border-emerald-600 ring-4 ring-emerald-100 dark:ring-emerald-900/20': activeStore === name, 'border-slate-200 dark:border-slate-700': activeStore !== name}"
                         class="frosted-glass p-8 rounded-4xl border cursor-pointer transition-all hover:border-emerald-600 hover:ring-4 hover:ring-emerald-100 dark:hover:ring-emerald-900/20">
                        <div class="flex items-center justify-between mb-4">
                            <h4 class="text-2xl font-black text-slate-900 dark:text-white tracking-tight" x-text="name"></h4>
                            <div :class="{'bg-emerald-600 text-white': activeStore === name, 'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-300': activeStore !== name}"
                                 class="w-10 h-10 rounded-full flex items-center justify-center transition-all">
                                <i data-lucide="chevron-right" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 text-sm font-medium text-slate-500 dark:text-slate-400 mb-6">
                            <i data-lucide="map-pin" class="w-5 h-5 text-emerald-600"></i> <span x-text="store.address"></span>
                        </div>
                        <div class="flex flex-wrap gap-6 border-t border-slate-100 pt-6">
                            <div class="flex items-center gap-3 text-xs font-black text-slate-400 uppercase tracking-widest"><i data-lucide="clock" class="w-4 h-4 text-emerald-600"></i> <span x-text="store.hours"></span></div>
                            <div class="flex items-center gap-3 text-xs font-black text-slate-400 uppercase tracking-widest"><i data-lucide="phone" class="w-4 h-4 text-orange-500"></i> <span x-text="store.phone"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Visual Map Placeholder -->
            <div class="relative rounded-[4rem] overflow-hidden map-glow border-8 border-white group">
                <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?q=80&w=1200" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[5s]">
                <div class="absolute inset-0 bg-emerald-950/20 backdrop-grayscale-[0.5]"></div>

                <div class="absolute bottom-10 left-10 right-10 glass-card p-10 rounded-[3rem] border-none shadow-5xl" 
                     x-show="selectedStore" x-transition>
                    <div class="flex items-start justify-between">
                         <div class="space-y-2">
                             <p class="text-xs font-black text-emerald-600 uppercase tracking-[0.2em] mb-2">Selected Outlet</p>
                             <h4 class="text-3xl font-black text-slate-900 tracking-tight" x-text="selectedStore"></h4>
                         </div>
                         <div class="bg-slate-900 text-white p-5 rounded-3xl hover:bg-emerald-600 transition-all shadow-xl active:scale-90 cursor-pointer">
                             <i data-lucide="navigation-2" class="w-8 h-8"></i>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-12 text-center text-slate-400 font-bold tracking-widest uppercase text-[10px]">
        &copy; 2026 CTS_SM Premium Group.
    </footer>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        lucide.createIcons();
    </script>
</body>
</html>
