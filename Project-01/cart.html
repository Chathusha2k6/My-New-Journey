<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | CTS_SM Supermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fafafa; color: #1a1a1a; transition: background-color 0.5s ease, color 0.5s ease; }
        .dark body { background: #0f172a; color: #f8fafc; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 100% 0%, #ecfdf5 0%, transparent 40%), radial-gradient(circle at 0% 100%, #fff7ed 0%, transparent 40%); transition: opacity 0.5s ease; }
        .dark .mesh-bg { background: radial-gradient(circle at 100% 0%, #064e3b 0%, transparent 40%), radial-gradient(circle at 0% 100%, #431407 0%, transparent 40%); }
        .frosted-glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .frosted-glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        .floating-ui { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .dark .floating-ui { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { emerald: { 600: '#059669' }, orange: { 500: '#f97316' } }, borderRadius: { '4xl': '2rem', '5xl': '3rem' } } } }
        // Immediate Theme Injection
        if (localStorage.getItem('cts_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</head>
<body x-data="{ mobileMenu: false }">
    <div class="mesh-bg"></div>
    <script src="js/app.js"></script>

    <!-- Navigation -->
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-7xl">
        <div class="frosted-glass rounded-[2.5rem] px-6 md:px-8 py-4 flex justify-between items-center shadow-2xl shadow-slate-200/50 border-white/40 dark:border-white/10">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-slate-900 dark:bg-emerald-600 rounded-2xl flex items-center justify-center text-white"><i data-lucide="zap" class="w-5 h-5 md:w-6 md:h-6 fill-current"></i></div>
                <span class="text-xl md:text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase transition-colors">CTS<span class="text-emerald-600">_SM</span></span>
            </a>
            
            <div class="hidden md:flex items-center gap-10 font-bold text-slate-500 uppercase tracking-widest text-[10px]">
                <a href="index.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Hub</a>
                <a href="shop.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Store</a>
                <a href="contact.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Finder</a>
            </div>

            <div class="flex items-center gap-2 md:gap-3">
                <!-- Theme Toggle -->
                <button @click="$store.theme.toggle()" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all">
                    <i x-show="!$store.theme.isDark" data-lucide="moon" class="w-5 h-5 md:w-6 md:h-6 text-slate-600"></i>
                    <i x-show="$store.theme.isDark" data-lucide="sun" class="w-5 h-5 md:w-6 md:h-6 text-yellow-400"></i>
                </button>

                <a href="cart.html" class="relative p-3 md:p-4 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all group scale-110">
                    <i data-lucide="shopping-bag" class="w-5 h-5 md:w-6 md:h-6 text-slate-900 dark:text-white group-hover:text-emerald-600 transition-colors"></i>
                    <template x-if="$store.cart.count > 0">
                        <span x-text="$store.cart.count" class="absolute top-2 right-2 bg-emerald-600 text-white text-[8px] md:text-[9px] font-black px-1.5 py-0.5 rounded-full"></span>
                    </template>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 lg:px-12 py-20 mt-16">
        <template x-if="$store.cart.items.length === 0">
            <div class="text-center py-20 md:py-40 space-y-10 floating-ui rounded-[4rem] p-10 md:p-20 shadow-2xl shadow-slate-200/50 dark:shadow-none border-none">
                <div class="w-32 h-32 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto text-slate-300 dark:text-slate-600">
                    <i data-lucide="shopping-cart" class="w-16 h-16"></i>
                </div>
                <h2 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tighter">Your basket is empty</h2>
                <p class="text-slate-500 dark:text-slate-400 font-bold max-w-sm mx-auto text-lg leading-relaxed">Looks like you haven't added any fresh goodness yet. Let's fill it up!</p>
                <a href="shop.html" class="inline-block bg-slate-900 dark:bg-emerald-600 text-white px-12 py-6 rounded-3xl font-black text-lg shadow-xl hover:scale-105 transition-all">Start Shopping</a>
            </div>
        </template>

        <template x-if="$store.cart.items.length > 0">
            <div class="grid lg:grid-cols-12 gap-12 lg:gap-20">
                <!-- Cart Items List -->
                <div class="lg:col-span-8 space-y-8">
                    <h1 class="text-5xl md:text-6xl font-black text-slate-900 dark:text-white tracking-tighter mb-12">My Basket.</h1>
                    <div class="space-y-6">
                        <template x-for="item in $store.cart.items" :key="item.id">
                            <div class="floating-ui rounded-[3rem] p-6 md:p-8 flex flex-col sm:flex-row items-center gap-8 group hover:shadow-5xl transition-all duration-700">
                                <div class="w-full sm:w-32 h-32 rounded-[2.5rem] overflow-hidden bg-slate-100 dark:bg-slate-800 flex-shrink-0">
                                    <img :src="item.img" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                </div>
                                <div class="flex-1 text-center sm:text-left">
                                    <p class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.2em] mb-1" x-text="item.category"></p>
                                    <h3 class="text-2xl font-black text-slate-900 dark:text-white" x-text="item.name"></h3>
                                    <p class="text-sm font-bold text-slate-400 dark:text-slate-500" x-text="item.weight"></p>
                                </div>
                                <div class="flex items-center gap-6 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <button @click="$store.cart.updateQuantity(item.id, item.quantity - 1)" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-emerald-600 hover:text-white transition-all shadow-sm"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                    <span class="font-black text-xl text-slate-800 dark:text-white w-6 text-center" x-text="item.quantity"></span>
                                    <button @click="$store.cart.updateQuantity(item.id, item.quantity + 1)" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-emerald-600 hover:text-white transition-all shadow-sm"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                </div>
                                <div class="text-center sm:text-right flex flex-col items-center sm:items-end">
                                    <p class="text-3xl font-black text-slate-900 dark:text-emerald-500 tracking-tighter">Rs. <span x-text="item.price * item.quantity"></span></p>
                                    <button @click="$store.cart.removeItem(item.id)" class="text-[10px] font-black text-red-500 uppercase tracking-widest hover:text-red-400 transition-colors mt-2">Remove Item</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Summary Panel -->
                <div class="lg:col-span-4">
                    <div class="floating-ui rounded-[4rem] p-10 md:p-12 space-y-10 sticky top-36">
                        <h2 class="text-4xl font-black tracking-tighter text-slate-900 dark:text-white">Summary.</h2>
                        <div class="space-y-6 pt-6 border-t border-slate-100 dark:border-slate-800">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-black uppercase tracking-widest text-slate-400">Total Items</span>
                                <span class="text-lg font-black text-slate-900 dark:text-white" x-text="$store.cart.count"></span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-black uppercase tracking-widest text-slate-400">Delivery Fee</span>
                                <span class="text-emerald-600 font-black text-lg">FREE</span>
                            </div>
                            <div class="pt-8 border-t-2 border-slate-900 dark:border-white/20 flex justify-between items-end">
                                <span class="text-sm font-black uppercase tracking-widest text-slate-900 dark:text-white">Total</span>
                                <span class="text-5xl font-black text-slate-900 dark:text-emerald-500 tracking-tighter">Rs. <span x-text="$store.cart.totalAmount"></span></span>
                            </div>
                        </div>

                        <button @click="checkoutProgress = true; setTimeout(() => { $store.cart.clear(); window.location.href='index.html'; alert('Order Confirmed Machan!') }, 2000)" 
                                class="w-full bg-slate-900 dark:bg-emerald-600 text-white py-6 rounded-[2.5rem] font-black text-xl shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-4 group">
                            <span>Confirm Order</span>
                            <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-2 transition-transform"></i>
                        </button>

                        <div class="p-6 bg-emerald-50 dark:bg-emerald-900/10 rounded-3xl border border-emerald-100 dark:border-emerald-500/20 space-y-4">
                            <div class="flex items-center gap-4 text-[10px] font-black text-emerald-800 dark:text-emerald-400 uppercase tracking-widest"><i data-lucide="shield-check" class="w-4 h-4"></i> Secure Checkout</div>
                            <div class="flex items-center gap-4 text-[10px] font-black text-emerald-800 dark:text-emerald-400 uppercase tracking-widest"><i data-lucide="truck" class="w-4 h-4"></i> Rapid Delivery</div>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </main>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        lucide.createIcons();
    </script>
</body>
</html>
