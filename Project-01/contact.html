<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Locator | CTS_SM Supermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f0f4f8; color: #1e293b; }
        .mesh-gradient { background-image: radial-gradient(at 0% 0%, rgba(5, 150, 105, 0.1) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0px, transparent 50%); }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .map-glow { box-shadow: 0 0 50px -10px rgba(5, 150, 105, 0.15); }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { emerald: { 600: '#059669' }, orange: { 500: '#f97316' } }, borderRadius: { '4xl': '2rem', '5xl': '3rem' } } } }
    </script>
</head>
<body x-data="{ selectedStore: 'Colombo 03' }" class="mesh-gradient min-h-screen">
    <script src="js/app.js"></script>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 lg:px-12">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="shopping-bag" class="w-6 h-6"></i></div>
                    <span class="text-2xl font-extrabold tracking-tight text-slate-900">CTS<span class="text-emerald-600">_SM</span></span>
                </a>
                <div class="flex items-center gap-6 font-bold text-slate-500 uppercase tracking-widest text-xs">
                    <a href="index.html" class="hover:text-emerald-600 transition-colors">Home</a>
                    <a href="shop.html" class="hover:text-emerald-600 transition-colors">Shop</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 lg:px-12 py-20">
        <header class="text-center mb-20 space-y-6">
            <div class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase tracking-widest">
                <i data-lucide="map-pin" class="w-4 h-4"></i> Local Presence
            </div>
            <h1 class="text-5xl lg:text-7xl font-black text-slate-900 tracking-tighter">Your Closest Freshness.</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 h-[700px]">
            <!-- Store Cards -->
            <div class="space-y-6 overflow-y-auto pr-6 hide-scrollbar">
                <template x-for="store in [
                    { id: 'Colombo 03', title: 'Flagship - Colombo 03', addr: 'Galle Road, Colombo 03', hours: '7 AM - 11 PM', phone: '+94 112 345 678' },
                    { id: 'Nugegoda', title: 'Hub - Nugegoda', addr: 'High Level Road, Nugegoda', hours: '8 AM - 11 PM', phone: '+94 112 876 543' },
                    { id: 'Kandy', title: 'Kandy Central', addr: 'Dalada Veediya, Kandy', hours: '8 AM - 9 PM', phone: '+94 812 224 567' }
                ]">
                    <div @click="selectedStore = store.id" 
                         :class="selectedStore === store.id ? 'border-emerald-500 shadow-2xl bg-white scale-[1.02]' : 'border-transparent bg-white/40'"
                         class="p-10 rounded-[2.5rem] border-2 cursor-pointer transition-all duration-500 group">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-2xl font-black text-slate-900 tracking-tight" x-text="store.title"></h3>
                                <p class="text-slate-500 font-bold" x-text="store.addr"></p>
                            </div>
                            <span class="bg-emerald-600 text-white p-3 rounded-2xl shadow-lg opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="navigation"></i></span>
                        </div>
                        <div class="flex flex-wrap gap-6 border-t border-slate-100 pt-6">
                            <div class="flex items-center gap-3 text-xs font-black text-slate-400 uppercase tracking-widest"><i data-lucide="clock" class="w-4 h-4 text-emerald-600"></i> <span x-text="store.hours"></span></div>
                            <div class="flex items-center gap-3 text-xs font-black text-slate-400 uppercase tracking-widest"><i data-lucide="phone" class="w-4 h-4 text-orange-500"></i> <span x-text="store.phone"></span></div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Visual Map Placeholder -->
            <div class="relative rounded-[4rem] overflow-hidden map-glow border-8 border-white group">
                <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?q=80&w=1200" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[5s]">
                <div class="absolute inset-0 bg-emerald-950/20 backdrop-grayscale-[0.5]"></div>

                <div class="absolute bottom-10 left-10 right-10 glass-card p-10 rounded-[3rem] border-none shadow-5xl" 
                     x-show="selectedStore" x-transition>
                    <div class="flex items-start justify-between">
                         <div class="space-y-2">
                             <p class="text-xs font-black text-emerald-600 uppercase tracking-[0.2em] mb-2">Selected Outlet</p>
                             <h4 class="text-3xl font-black text-slate-900 tracking-tight" x-text="selectedStore"></h4>
                         </div>
                         <div class="bg-slate-900 text-white p-5 rounded-3xl hover:bg-emerald-600 transition-all shadow-xl active:scale-90 cursor-pointer">
                             <i data-lucide="navigation-2" class="w-8 h-8"></i>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-12 text-center text-slate-400 font-bold tracking-widest uppercase text-[10px]">
        &copy; 2026 CTS_SM Premium Group.
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
