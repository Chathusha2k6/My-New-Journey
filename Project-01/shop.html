<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | CTS_SM Supermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #fafafa; color: #1a1a1a; transition: background-color 0.5s ease, color 0.5s ease; }
        .dark body { background: #0f172a; color: #f8fafc; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 100% 0%, #ecfdf5 0%, transparent 40%), radial-gradient(circle at 0% 100%, #fff7ed 0%, transparent 40%); transition: opacity 0.5s ease; }
        .dark .mesh-bg { background: radial-gradient(circle at 100% 0%, #064e3b 0%, transparent 40%), radial-gradient(circle at 0% 100%, #431407 0%, transparent 40%); }
        .frosted-glass { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .frosted-glass { background: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        .floating-ui { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        .dark .floating-ui { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { emerald: { 600: '#059669' }, orange: { 500: '#f97316' } }, borderRadius: { '4xl': '2rem', '5xl': '3rem' } } } }
        // Immediate Theme Injection
        if (localStorage.getItem('cts_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</head>
<body x-data="{
    category: 'All',
    search: '',
    showToast: false,
    toastMsg: '',
    get filteredProducts() {
        return $store.products.list.filter(p => {
            const matchesCategory = this.category === 'All' || p.category === this.category;
            const matchesSearch = p.name.toLowerCase().includes(this.search.toLowerCase());
            return matchesCategory && matchesSearch;
        });
    }
}" @toast.window="toastMsg = $event.detail.message; showToast = true; setTimeout(() => showToast = false, 3000)">
    <div class="mesh-bg"></div>
    <script src="js/app.js"></script>

    <!-- Navigation -->
    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-50 w-[92%] max-w-7xl">
        <div class="frosted-glass rounded-[2.5rem] px-6 md:px-8 py-4 flex justify-between items-center shadow-2xl shadow-slate-200/50 border-white/40 dark:border-white/10">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 md:w-10 md:h-10 bg-slate-900 dark:bg-emerald-600 rounded-2xl flex items-center justify-center text-white"><i data-lucide="zap" class="w-5 h-5 md:w-6 md:h-6 fill-current"></i></div>
                <span class="text-xl md:text-2xl font-black tracking-tighter text-slate-900 dark:text-white uppercase transition-colors">CTS<span class="text-emerald-600">_SM</span></span>
            </a>

            <div class="hidden md:flex items-center gap-10 font-bold text-slate-500 uppercase tracking-widest text-[10px]">
                <a href="index.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Hub</a>
                <a href="shop.html" class="text-slate-900 dark:text-white transition-all scale-110">Store</a>
                <a href="contact.html" class="hover:text-emerald-600 transition-all dark:hover:text-emerald-500">Finder</a>
            </div>

            <div class="flex items-center gap-2 md:gap-3">
                <!-- Theme Toggle -->
                <button @click="$store.theme.toggle()" class="p-3 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all">
                    <i x-show="!$store.theme.isDark" data-lucide="moon" class="w-5 h-5 md:w-6 md:h-6 text-slate-600"></i>
                    <i x-show="$store.theme.isDark" data-lucide="sun" class="w-5 h-5 md:w-6 md:h-6 text-yellow-400"></i>
                </button>

                <a href="cart.html" class="relative p-3 md:p-4 rounded-2xl hover:bg-white dark:hover:bg-slate-800 transition-all group">
                    <i data-lucide="shopping-bag" class="w-5 h-5 md:w-6 md:h-6 text-slate-600 dark:text-slate-400 group-hover:text-emerald-600 transition-colors"></i>
                    <template x-if="$store.cart.count > 0">
                        <span x-text="$store.cart.count" class="absolute top-2 right-2 bg-emerald-600 text-white text-[8px] md:text-[9px] font-black px-1.5 py-0.5 rounded-full"></span>
                    </template>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 lg:px-12 py-20">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Sidebar Filters -->
            <div class="lg:w-80 space-y-10">
                <div class="floating-ui rounded-[3rem] p-8 space-y-10 sticky top-36">
                    <div class="space-y-4">
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-emerald-600">Quick Find</p>
                        <div class="relative group">
                            <input type="text" x-model="search" placeholder="Search..." class="w-full bg-slate-100 dark:bg-slate-800 rounded-2xl py-4 pl-12 pr-6 border-none focus:ring-2 focus:ring-emerald-500 transition-all dark:text-white">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Categories</p>
                        <div class="flex flex-wrap lg:flex-col gap-3">
                            <template x-for="cat in ['All', 'Vegetables', 'Fruits', 'Meat & Poultry', 'Dairy', 'Bakery', 'Household']">
                                <button @click="category = cat"
                                        :class="category === cat ? 'bg-emerald-600 text-white shadow-xl translate-x-3' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-700'"
                                        class="flex items-center justify-between px-6 py-4 rounded-2xl font-bold transition-all duration-500 text-left w-auto lg:w-full">
                                    <span x-text="cat"></span>
                                    <i data-lucide="chevron-right" class="w-4 h-4" x-show="category === cat"></i>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="flex-1">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-8">
                    <template x-for="product in filteredProducts" :key="product.id">
                        <div class="group bg-white dark:bg-slate-800 rounded-[3rem] md:rounded-[3.5rem] p-6 md:p-8 border border-transparent hover:border-emerald-500/20 shadow-sm hover:shadow-5xl transition-all duration-700">
                             <div class="h-48 md:h-64 rounded-[2rem] md:rounded-[2.5rem] overflow-hidden mb-8 md:mb-10 shadow-inner bg-slate-50 dark:bg-slate-900 relative">
                                 <img :src="product.img" @error="$el.src='https://placehold.co/400?text=Premium+Item'" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[2s]">
                                 <button @click="$store.cart.addItem(product)" class="absolute bottom-4 right-4 md:bottom-6 md:right-6 bg-slate-900 dark:bg-emerald-600 text-white p-4 md:p-6 rounded-[1.5rem] md:rounded-3xl hover:bg-emerald-600 dark:hover:bg-emerald-500 transition-all shadow-4xl translate-y-4 opacity-0 group-hover:translate-y-0 group-hover:opacity-100">
                                     <i data-lucide="plus" class="w-6 h-6 md:w-8 md:h-8"></i>
                                 </button>
                             </div>
                             <div class="space-y-4">
                                 <p class="text-[10px] font-black text-emerald-600 uppercase tracking-widest" x-text="product.category"></p>
                                 <div class="flex justify-between items-start">
                                     <h3 class="text-xl md:text-2xl font-black text-slate-900 dark:text-white leading-tight" x-text="product.name"></h3>
                                     <span class="text-[10px] font-bold bg-slate-100 dark:bg-slate-700 px-3 py-1 rounded-full dark:text-slate-300" x-text="product.weight"></span>
                                 </div>
                                 <div class="flex items-center justify-between pt-4 border-t border-slate-50 dark:border-slate-700">
                                     <span class="text-2xl md:text-3xl font-black text-slate-900 dark:text-emerald-500">Rs. <span x-text="product.price"></span></span>
                                     <i data-lucide="zap" class="w-5 h-5 text-slate-200 dark:text-slate-700"></i>
                                 </div>
                             </div>
                        </div>
                    </template>
                </div>

                <!-- Empty State -->
                <div x-show="filteredProducts.length === 0" class="flex flex-col items-center justify-center py-40 space-y-6">
                    <div class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-600"><i data-lucide="search-x" class="w-12 h-12"></i></div>
                    <p class="text-xl font-bold text-slate-400 dark:text-slate-500">Oops! No items found matching your search.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
        lucide.createIcons();
    </script>
</body>
</html>
