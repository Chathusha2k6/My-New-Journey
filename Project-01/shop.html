<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | CTS_SM Supermarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f0f4f8; color: #1e293b; }
        .mesh-gradient { background-image: radial-gradient(at 0% 0%, rgba(5, 150, 105, 0.1) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.05) 0px, transparent 50%); }
        .glass-card { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .glass-nav { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { emerald: { 600: '#059669' }, orange: { 500: '#f97316' } }, borderRadius: { '4xl': '2rem' } } } }
    </script>
</head>
<body x-data="{ mobileFilters: false, showToast: false, toastMsg: '' }" @toast.window="toastMsg = $event.detail.message; showToast = true; setTimeout(() => showToast = false, 3000)" class="mesh-gradient min-h-screen">
    <script src="js/app.js"></script>

    <!-- Global Toast -->
    <div x-show="showToast" x-transition class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] glass-card px-6 py-3 rounded-full border-emerald-500/30 flex items-center gap-3">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-600"></i>
        <span class="font-semibold text-slate-800" x-text="toastMsg"></span>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-4 lg:px-12">
            <div class="flex justify-between items-center h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i data-lucide="shopping-bag" class="w-6 h-6"></i></div>
                    <span class="text-2xl font-extrabold tracking-tight text-slate-900">CTS<span class="text-emerald-600">_SM</span></span>
                </a>
                <div class="flex items-center gap-6">
                    <a href="index.html" class="hidden sm:block font-bold text-slate-500 hover:text-emerald-600 transition-colors uppercase tracking-widest text-xs">Home</a>
                    <a href="cart.html" class="relative group p-3 rounded-2xl glass-card border-none hover:bg-emerald-600 hover:text-white transition-all shadow-none">
                        <i data-lucide="shopping-cart" class="w-6 h-6 text-slate-600 group-hover:text-white"></i>
                        <template x-if="$store.cart.count > 0"><span x-text="$store.cart.count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full ring-4 ring-[#f0f4f8]"></span></template>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 lg:px-12 py-12">
        <div class="flex flex-col lg:row gap-12">
            <!-- Sidebar -->
            <aside class="hidden lg:block w-72 space-y-8 sticky top-32 h-fit">
                <div class="glass-card p-10 rounded-4xl border-none shadow-2xl shadow-slate-200/50">
                    <h3 class="text-xl font-black text-slate-900 mb-8 flex items-center gap-3"><i data-lucide="sliders-horizontal" class="w-5 h-5 text-emerald-600"></i> Filtering</h3>
                    <div class="space-y-10">
                        <div>
                            <p class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">Categories</p>
                            <div class="space-y-4">
                                <template x-for="cat in ['Vegetables', 'Fruits', 'Meat & Poultry', 'Dairy', 'Bakery']">
                                    <label class="flex items-center gap-3 cursor-pointer group">
                                        <input type="checkbox" class="w-5 h-5 rounded-lg border-slate-300 text-emerald-600 focus:ring-emerald-500 transition-all">
                                        <span class="font-bold text-slate-600 group-hover:text-emerald-600 transition-colors" x-text="cat"></span>
                                    </label>
                                </template>
                            </div>
                        </div>
                        <div>
                            <p class="text-xs font-black text-slate-400 mb-6 uppercase tracking-widest">Price Range</p>
                            <input type="range" min="0" max="5000" class="w-full h-2 bg-slate-200 rounded-full appearance-none accent-emerald-600 cursor-pointer">
                            <div class="flex justify-between text-xs font-black text-slate-500 mt-4 uppercase"><span>Rs. 0</span><span>Rs. 5000+</span></div>
                        </div>
                        <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-emerald-600 transition-all shadow-xl shadow-slate-900/10 active:scale-95">Apply Filters</button>
                    </div>
                </div>
            </aside>

            <!-- Product Grid -->
            <div class="flex-1">
                <div class="flex items-center justify-between mb-12">
                    <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Premium Collection</h1>
                    <div class="flex items-center gap-4">
                        <button @click="mobileFilters = true" class="lg:hidden glass-card p-3 rounded-2xl border-none"><i data-lucide="list-filter" class="w-5 h-5 text-slate-600"></i></button>
                        <select class="bg-white/40 border border-white/50 rounded-2xl px-6 py-3 font-bold text-sm focus:outline-none focus:ring-4 focus:ring-emerald-500/10">
                            <option>Relevance</option><option>Newest First</option><option>Price: Low to High</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                    <template x-for="product in [
                        { id: 10, name: 'Red Bell Pepper', weight: '250g', price: 150, img: 'https://images.unsplash.com/photo-1563506733124-80770a2876a2?q=80&w=400' },
                        { id: 11, name: 'Avocado Pack', weight: '2 Units', price: 680, img: 'https://images.unsplash.com/photo-1523049673857-eb18f1d7b578?q=80&w=400' },
                        { id: 12, name: 'Sourdough Bread', weight: 'Large', price: 340, img: 'https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=400' },
                        { id: 13, name: 'Organic Honey', weight: '200g', price: 890, img: 'https://images.unsplash.com/photo-1587049352846-4a222e784d38?q=80&w=400' },
                        { id: 14, name: 'Farm Fresh Eggs', weight: '12 Pack', price: 420, img: 'https://images.unsplash.com/photo-1506976785307-8732e854ad03?q=80&w=400' },
                        { id: 15, name: 'Greek Yogurt', weight: '500g', price: 550, img: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?q=80&w=400' }
                    ]">
                        <div class="group bg-white rounded-5xl p-6 shadow-sm hover:shadow-5xl transition-all duration-700 border border-transparent hover:border-emerald-500/30">
                            <div class="relative h-56 rounded-4xl overflow-hidden mb-8 shadow-inner bg-slate-50">
                                <img :src="product.img" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000">
                                <button @click="$store.cart.addItem(product)" class="absolute top-4 right-4 bg-white/40 backdrop-blur-md p-3 rounded-2xl text-emerald-700 opacity-0 group-hover:opacity-100 translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-xl hover:bg-emerald-600 hover:text-white scale-90 hover:scale-100">
                                    <i data-lucide="plus" class="w-6 h-6"></i>
                                </button>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <h3 class="text-xl font-bold text-slate-900 tracking-tight" x-text="product.name"></h3>
                                    <p class="text-sm font-bold text-slate-400" x-text="product.weight"></p>
                                </div>
                                <div class="flex items-center justify-between pt-2">
                                    <span class="text-2xl font-black text-emerald-600">Rs. <span x-text="product.price"></span></span>
                                    <span class="bg-slate-50 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase text-slate-400 tracking-widest">In Stock</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
